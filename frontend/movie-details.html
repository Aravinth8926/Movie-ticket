<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - CineBook</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .movie-banner {
            position: relative;
            height: 400px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 2rem;
        }

        .movie-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to right, rgba(26, 10, 15, 0.95), rgba(26, 10, 15, 0.7));
        }

        .banner-content {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .banner-poster {
            width: 250px;
            height: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            object-fit: cover;
        }

        .banner-info {
            flex: 1;
            color: var(--cream);
        }

        .banner-info h1 {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .movie-meta-large {
            display: flex;
            gap: 2rem;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cast-section {
            padding: 3rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cast-grid {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            padding: 1rem 0;
        }

        .cast-member {
            text-align: center;
            min-width: 120px;
        }

        .cast-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            font-size: 2rem;
            color: var(--dark);
            font-weight: 700;
        }

        .shows-section {
            padding: 3rem 2rem;
            background: rgba(139, 26, 47, 0.05);
        }

        .date-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding: 1rem 0;
        }

        .date-card {
            min-width: 100px;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .date-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.95);
        }

        .date-card.active {
            border-color: var(--primary);
            background: rgba(139, 26, 47, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: var(--cream);
            box-shadow: 0 8px 25px rgba(139, 26, 47, 0.3);
        }

        .date-day {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .date-date {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .theater-shows {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .theater-shows:hover {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .theater-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .theater-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .theater-location {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .time-slots {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .time-slot {
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            position: relative;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .time-slot:hover {
            transform: translateY(-3px) rotate(-1deg);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.95);
        }

        .time-slot.available {
            border-color: var(--success);
            color: var(--success);
        }

        .time-slot.filling-fast {
            border-color: var(--warning);
            color: var(--warning);
        }

        .time-slot.housefull {
            border-color: var(--primary);
            color: var(--primary);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .availability-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--success);
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
        }

        .time-slot.filling-fast .availability-badge {
            background: var(--warning);
        }
    </style>
</head>
<body class="grain-overlay">
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">
            <div class="logo-circle">
                <i data-lucide="film" style="color: var(--gold);"></i>
            </div>
            <span>CineBook</span>
        </a>
        <ul class="navbar-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="history.html">My Bookings</a></li>
            <li><a href="#" id="loginBtn">Login</a></li>
        </ul>
    </nav>

    <!-- Movie Banner -->
    <div class="movie-banner" id="movieBanner">
        <div class="banner-content">
            <img src="" alt="Movie Poster" class="banner-poster" id="bannerPoster">
            <div class="banner-info">
                <h1 id="movieTitle">Loading...</h1>
                <div class="movie-meta-large" id="movieMeta"></div>
                <p id="movieDescription" style="line-height: 1.8; margin-top: 1rem;"></p>
            </div>
        </div>
    </div>

    <!-- Cast Section -->
    <section class="cast-section">
        <h2 class="section-title">Cast & Crew</h2>
        <div style="margin-bottom: 1rem;">
            <strong>Director:</strong> <span id="directorName"></span>
        </div>
        <div class="cast-grid" id="castGrid"></div>
    </section>

    <!-- Shows Section -->
    <section class="shows-section">
        <div style="max-width: 1400px; margin: 0 auto;">
            <h2 class="section-title">Book Tickets</h2>
            
            <!-- Date Selector -->
            <div class="date-selector" id="dateSelector"></div>

            <!-- Theater Shows -->
            <div id="theaterShowsContainer">
                <div class="loading">
                    <div class="film-projector"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Privacy Policy</a>
        </div>
        <p style="margin-top: 1rem; color: var(--gold);">&copy; 2024 CineBook. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/movie-details.js"></script>
</body>
</html>
