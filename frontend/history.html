<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - CineBook</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .history-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .filter-tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(107, 76, 84, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .filter-tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.95);
        }

        .filter-tab.active {
            background: rgba(139, 26, 47, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 6px 20px rgba(139, 26, 47, 0.3);
        }

        .search-booking {
            max-width: 500px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gold);
        }

        .booking-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
            transition: all 0.3s;
        }

        .booking-card:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.95);
        }

        .booking-card.confirmed {
            border-left: 5px solid var(--success);
        }

        .booking-card.cancelled {
            border-left: 5px solid var(--primary);
            opacity: 0.7;
        }

        .booking-card.cancelled .booking-movie-title {
            text-decoration: line-through;
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .booking-movie-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .booking-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .booking-status.confirmed {
            background: var(--success);
            color: white;
        }

        .booking-status.cancelled {
            background: var(--primary);
            color: white;
        }

        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .booking-detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .booking-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .cancel-btn {
            padding: 0.6rem 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .cancel-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .cancel-btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .view-ticket-btn {
            padding: 0.6rem 1.2rem;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .view-ticket-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="grain-overlay">
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">
            <div class="logo-circle">
                <i data-lucide="film" style="color: var(--gold);"></i>
            </div>
            <span>CineBook</span>
        </a>
        <ul class="navbar-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="history.html">My Bookings</a></li>
            <li><a href="#" id="loginBtn">Login</a></li>
        </ul>
    </nav>

    <div class="history-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>My Bookings</h1>
            <p style="font-size: 1.1rem; color: var(--text-secondary);">
                View and manage your movie ticket bookings
            </p>
        </div>

        <!-- Search -->
        <div class="search-booking">
            <input type="text" class="search-bar" id="searchBookingInput" placeholder="Search by booking ID...">
            <i data-lucide="search" class="search-icon"></i>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <div class="filter-tab active" data-filter="all">All</div>
            <div class="filter-tab" data-filter="upcoming">Upcoming</div>
            <div class="filter-tab" data-filter="past">Past</div>
            <div class="filter-tab" data-filter="cancelled">Cancelled</div>
        </div>

        <!-- Timeline -->
        <div class="timeline" id="bookingsTimeline">
            <div class="loading">
                <div class="film-projector"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Terms & Conditions</a>
        </div>
        <p style="margin-top: 1rem; color: var(--gold);">&copy; 2024 CineBook. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
