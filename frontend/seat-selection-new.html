<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats - CineBook</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  
  <link rel="stylesheet" href="css/seat-selection-new.css">
</head>
<body>
  
  <!-- TOP NAVBAR -->
  <nav class="booking-nav">
    <div class="nav-left">
      <button class="back-btn" onclick="window.history.back()">
        <i data-lucide="arrow-left"></i>
      </button>
      <div class="movie-info-nav">
        <h2 class="movie-title-nav" id="navMovieTitle">Loading...</h2>
        <div class="show-meta">
          <span class="theater-name" id="navTheater">Theater</span>
          <span class="dot-sep">•</span>
          <span class="show-date" id="navDate">Date</span>
          <span class="dot-sep">•</span>
          <span class="show-time" id="navTime">Time</span>
        </div>
      </div>
    </div>
    <div class="nav-right">
      <div class="countdown-wrap">
        <i data-lucide="timer"></i>
        <span class="countdown-text">Hurry! Seats reserved for</span>
        <span class="countdown-timer" id="countdownTimer">09:59</span>
      </div>
    </div>
  </nav>

  <!-- MAIN WRAPPER -->
  <div class="seat-page-wrapper">
    
    <!-- SCREEN SECTION -->
    <div class="screen-section">
      <div class="screen-container">
        <div class="screen-box">
          <span class="screen-text">SCREEN - ALL EYES THIS WAY</span>
        </div>
        <div class="screen-glow"></div>
        <div class="screen-reflection"></div>
      </div>
    </div>

    <!-- CATEGORY STICKY JUMP BUTTONS -->
    <div class="category-jump-bar" id="categoryJumpBar">
      <button class="jump-btn active" data-target="platinum">
        PLATINUM
        <span class="jump-price">₹400</span>
      </button>
      <button class="jump-btn" data-target="gold">
        GOLD
        <span class="jump-price">₹250</span>
      </button>
      <button class="jump-btn" data-target="silver">
        SILVER
        <span class="jump-price">₹150</span>
      </button>
    </div>

    <!-- SEAT MAP AREA -->
    <div class="seat-map-area" id="seatMapArea">
      <!-- Seats will be generated by JavaScript -->
    </div>

    <!-- LEGEND ROW -->
    <div class="legend-row">
      <div class="legend-item">
        <div class="legend-seat available-legend"></div>
        <span>Available</span>
      </div>
      <div class="legend-item">
        <div class="legend-seat selected-legend"></div>
        <span>Selected</span>
      </div>
      <div class="legend-item">
        <div class="legend-seat sold-legend"></div>
        <span>Sold Out</span>
      </div>
    </div>

  </div>
  <!-- END MAIN WRAPPER -->

  <!-- BOTTOM STICKY BOOKING BAR -->
  <div class="bottom-booking-bar" id="bottomBar">
    <div class="bar-left">
      <div class="selected-seats-display" id="selectedSeatsDisplay">
        <span class="select-prompt">
          <i data-lucide="mouse-pointer-2"></i>
          Select seats to continue
        </span>
      </div>
    </div>
    <div class="bar-right">
      <div class="price-display" id="priceDisplay">
        <span class="total-label">Total</span>
        <span class="total-amount" id="totalAmount">₹ 0</span>
      </div>
      <button class="pay-btn" id="payBtn" disabled>
        <span>Pay Now</span>
        <i data-lucide="arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- SEAT INFO POPUP (appears on seat hover) -->
  <div class="seat-tooltip" id="seatTooltip">
    <span class="tooltip-seat-id"></span>
    <span class="tooltip-price"></span>
  </div>

  <!-- SELECTED SEATS PILL TRAY (slides up when seats selected) -->
  <div class="seats-pill-tray" id="seatsPillTray">
    <!-- Pills added by JS -->
  </div>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/seat-selection-new.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
