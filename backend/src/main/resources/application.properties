spring.data.mongodb.uri=mongodb://localhost:27017/moviebooking
spring.data.mongodb.database=moviebooking
server.port=8080
spring.application.name=MovieBookingSystem

# Seat lock duration
seat.lock.duration.minutes=10

# Booking ID prefix
booking.id.prefix=BK

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500

# Logging
logging.level.com.moviebooking=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
